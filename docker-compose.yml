services:
  db:
    image: mysql:8.4
    container_name: template-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: template_db
      MYSQL_USER: template_user
      MYSQL_PASSWORD: template_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend/nodejs
      network: host
    container_name: template-backend
    environment:
      PORT: 3000
      DATABASE_URL: mysql://template_user:template_pass@db:3306/template_db
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE_MB: 10
      NODE_ENV: production
      CORS_ORIGIN: "*"
      MIGRATIONS_DIR: /app/migrations
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otelcol:4318/v1/traces
      OTEL_SERVICE_NAME: backend-nodejs
      # METRICS_TOKEN: ${METRICS_TOKEN}
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
      - ./db/mysql/migrations:/app/migrations:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./front/react
      network: host
    container_name: template-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: template-pma
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: template_user
      PMA_PASSWORD: template_pass
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  uploads_data:
